<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0b1e"/>
      <stop offset="50%" style="stop-color:#13102a"/>
      <stop offset="100%" style="stop-color:#0d0b1e"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#a78bfa;stop-opacity:0.8"/>
      <stop offset="70%" style="stop-color:#c084fc;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ddd8ff"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="orb1" cx="20%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" fill="url(#bg)" rx="12"/>
  <rect width="860" height="200" fill="url(#orb1)" rx="12"/>
  <rect width="860" height="200" fill="url(#orb2)" rx="12"/>

  <!-- Border -->
  <rect width="860" height="200" fill="none" stroke="rgba(167,139,250,0.2)" stroke-width="1" rx="12"/>

  <!-- Top accent line -->
  <line x1="0" y1="1" x2="860" y2="1" stroke="url(#line)" stroke-width="1.5" rx="12"/>

  <!-- Dots pattern top-right -->
  <g opacity="0.08" fill="#a78bfa">
    <circle cx="760" cy="30" r="1.5"/><circle cx="780" cy="30" r="1.5"/><circle cx="800" cy="30" r="1.5"/><circle cx="820" cy="30" r="1.5"/>
    <circle cx="750" cy="50" r="1.5"/><circle cx="770" cy="50" r="1.5"/><circle cx="790" cy="50" r="1.5"/><circle cx="810" cy="50" r="1.5"/><circle cx="830" cy="50" r="1.5"/>
    <circle cx="760" cy="70" r="1.5"/><circle cx="780" cy="70" r="1.5"/><circle cx="800" cy="70" r="1.5"/>
  </g>
  <!-- Dots pattern bottom-left -->
  <g opacity="0.06" fill="#a78bfa">
    <circle cx="40" cy="150" r="1.5"/><circle cx="60" cy="150" r="1.5"/><circle cx="80" cy="150" r="1.5"/>
    <circle cx="30" cy="170" r="1.5"/><circle cx="50" cy="170" r="1.5"/><circle cx="70" cy="170" r="1.5"/><circle cx="90" cy="170" r="1.5"/>
    <circle cx="40" cy="190" r="1.5"/><circle cx="60" cy="190" r="1.5"/>
  </g>

  <!-- Fox icon (stylized kitsune) -->
  <g transform="translate(62, 100)" filter="url(#softglow)">
    <!-- Fox body/head -->
    <ellipse cx="0" cy="8" rx="22" ry="18" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <!-- Ears -->
    <polygon points="-14,-8 -22,-26 -4,-12" fill="rgba(167,139,250,0.5)" stroke="rgba(167,139,250,0.7)" stroke-width="1" stroke-linejoin="round"/>
    <polygon points="14,-8 22,-26 4,-12" fill="rgba(167,139,250,0.5)" stroke="rgba(167,139,250,0.7)" stroke-width="1" stroke-linejoin="round"/>
    <!-- Inner ears -->
    <polygon points="-13,-10 -19,-23 -5,-13" fill="rgba(192,132,252,0.4)"/>
    <polygon points="13,-10 19,-23 5,-13" fill="rgba(192,132,252,0.4)"/>
    <!-- Face -->
    <ellipse cx="0" cy="6" rx="16" ry="14" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.35)" stroke-width="0.8"/>
    <!-- Eyes -->
    <ellipse cx="-6" cy="3" rx="3" ry="3.5" fill="rgba(192,132,252,0.9)" filter="url(#glow)"/>
    <ellipse cx="6" cy="3" rx="3" ry="3.5" fill="rgba(192,132,252,0.9)" filter="url(#glow)"/>
    <ellipse cx="-6" cy="3.5" rx="1.5" ry="2" fill="#1a1535"/>
    <ellipse cx="6" cy="3.5" rx="1.5" ry="2" fill="#1a1535"/>
    <!-- Shine -->
    <circle cx="-5" cy="2.5" r="0.8" fill="white" opacity="0.8"/>
    <circle cx="7" cy="2.5" r="0.8" fill="white" opacity="0.8"/>
    <!-- Nose -->
    <ellipse cx="0" cy="9" rx="2" ry="1.2" fill="rgba(192,132,252,0.6)"/>
    <!-- Tails (multiple - kitsune) -->
    <path d="M-10,20 Q-30,35 -24,50 Q-15,42 -8,32" fill="none" stroke="rgba(167,139,250,0.4)" stroke-width="3" stroke-linecap="round"/>
    <path d="M0,22 Q-8,38 -2,52 Q6,44 4,30" fill="none" stroke="rgba(167,139,250,0.35)" stroke-width="3" stroke-linecap="round"/>
    <path d="M10,20 Q24,36 18,50 Q8,43 6,32" fill="none" stroke="rgba(167,139,250,0.4)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- ✦ sparkle -->
  <text x="130" y="88" font-family="serif" font-size="18" fill="#a78bfa" opacity="0.7" filter="url(#glow)">✦</text>

  <!-- Main title -->
  <text x="155" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="48" font-weight="800" letter-spacing="-1" fill="url(#titleGrad)" filter="url(#glow)">KitsunePreset</text>

  <!-- Subtitle -->
  <text x="157" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="14" font-weight="400" fill="rgba(196,181,253,0.65)" letter-spacing="0.5">
    Менеджер пресетов для SillyTavern · Привязки к персонажам и чатам · Авто-переключение
  </text>

  <!-- Version badge -->
  <rect x="157" y="148" width="72" height="20" rx="10" fill="rgba(167,139,250,0.12)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="193" y="162" font-family="monospace" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="600">v 2.0.0</text>

  <!-- Author badge -->
  <rect x="238" y="148" width="68" height="20" rx="10" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <text x="272" y="162" font-family="monospace" font-size="11" fill="rgba(196,181,253,0.5)" text-anchor="middle">by Sora</text>

  <!-- Bottom line -->
  <line x1="0" y1="199" x2="860" y2="199" stroke="url(#line)" stroke-width="1"/>
</svg>
